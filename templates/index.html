<!DOCTYPE html>
<html>
<head>
<title>Student Performance Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{height:100vh;background:linear-gradient(135deg,#1d2b64,#f8cdda);display:flex;justify-content:center;align-items:center}
.card{backdrop-filter:blur(15px);background:rgba(255,255,255,0.1);padding:40px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);text-align:center;color:white;width:320px;animation:fadeIn 1s}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;outline:none}
button{width:100%;padding:12px;margin-top:15px;border:none;border-radius:10px;background:#ff7eb3;color:white;font-weight:bold;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.05);background:#ff4e9b}
h3{margin-top:20px;color:#00ffcc}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="card">
<h2>🚀 Student Predictor</h2>
<form action="/predict" method="post">
<input type="number" name="hours" placeholder="Study Hours" required>
<input type="number" name="attendance" placeholder="Attendance %" required>
<input type="number" name="previous_marks" placeholder="Previous Marks" required>
<button type="submit">Predict</button>
</form>
<h3>{{ prediction_text }}</h3>
</div>
</body>
</html>
